name: Research Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dirty-cow:
    name: Exploit Analysis (CVE-2016-5195)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Execute Orchestrator Script
      run: sudo python3 scripts/orchestrate.py --cve CVE-2016-5195
    - name: Upload Logs & Results
      uses: actions/upload-artifact@v4
      with:
        name: analysis-results-CVE-2016-5195
        path: /results/

  dirty-pipe:
