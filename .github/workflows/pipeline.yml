name: Research Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-analysis:
    name: Stage 1 - Exploit Analysis
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Execute Orchestrator Script
      run: |
        # Running with sudo because orchestrate.py writes to the root /results folder
        sudo python3 scripts/orchestrate.py

    - name: Upload Analysis JSON
      uses: actions/upload-artifact@v4
      with:
        name: analysis-results
        path: /results/analysis_output.json

  compile-paper:
    name: Stage 2 - Compile IEEE Paper
    runs-on: ubuntu-latest
    needs: run-analysis
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build LaTeX Document
      uses: xu-cheng/latex-action@v3
      with:
        root_file: IEEE_paper_linux_kernel_exploits.tex

    - name: Upload PDF Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ieee-paper
        path: IEEE_paper_linux_kernel_exploits.pdf
